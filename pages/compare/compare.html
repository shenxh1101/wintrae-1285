<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品比较 - 价格猎手</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="stylesheet" href="compare.css">
</head>
<body>
  <div class="page-header">
    <h1>⚖️ 商品比较</h1>
  </div>

  <div class="page-body">
    <div class="scheme-section">
      <div class="scheme-bar">
        <span class="scheme-label">对比方案：</span>
        <div class="scheme-tabs" id="scheme-tabs"></div>
        <div class="scheme-create">
          <input type="text" id="new-scheme-name" placeholder="方案名称，如：通勤耳机" class="scheme-input">
          <button class="btn btn-sm btn-primary" id="btn-save-scheme">新建方案</button>
        </div>
      </div>
    </div>

    <div id="scheme-settings" class="scheme-settings hidden">
      <div class="settings-card">
        <div class="settings-header">
          <h3>⚙️ 方案设置与偏好</h3>
          <button class="btn btn-sm btn-ghost" id="btn-toggle-settings">收起</button>
        </div>
        <div class="settings-body">
          <div class="settings-row">
            <div class="form-group">
              <label>购买场景</label>
              <input type="text" id="scheme-scene" placeholder="如：日常通勤用降噪耳机" class="form-input">
            </div>
            <div class="form-group">
              <label>预算上限 (¥)</label>
              <input type="number" id="scheme-budget" placeholder="如：2000" step="0.01" min="0" class="form-input">
            </div>
          </div>
          <div class="form-group">
            <label>权重偏好</label>
            <div class="weights-grid">
              <div class="weight-item">
                <div class="weight-head">
                  <span class="weight-label">💰 价格</span>
                  <span class="weight-value" id="weight-price-val">30%</span>
                </div>
                <input type="range" id="weight-price" min="0" max="100" value="30" class="weight-slider">
              </div>
              <div class="weight-item">
                <div class="weight-head">
                  <span class="weight-label">🛡️ 保修</span>
                  <span class="weight-value" id="weight-warranty-val">20%</span>
                </div>
                <input type="range" id="weight-warranty" min="0" max="100" value="20" class="weight-slider">
              </div>
              <div class="weight-item">
                <div class="weight-head">
                  <span class="weight-label">⭐ 评价</span>
                  <span class="weight-value" id="weight-rating-val">25%</span>
                </div>
                <input type="range" id="weight-rating" min="0" max="100" value="25" class="weight-slider">
              </div>
              <div class="weight-item">
                <div class="weight-head">
                  <span class="weight-label">📐 规格</span>
                  <span class="weight-value" id="weight-specs-val">25%</span>
                </div>
                <input type="range" id="weight-specs" min="0" max="100" value="25" class="weight-slider">
              </div>
            </div>
            <div class="weights-hint">提示：权重越高，该因素在推荐排序中的影响越大</div>
          </div>
          <button class="btn btn-primary" id="btn-save-settings">💾 保存设置并重算推荐</button>
        </div>
      </div>
    </div>

    <div id="recommendation-section" class="recommendation-section hidden">
      <div class="recommendation-card">
        <div class="recommendation-header">
          <h3>🏆 推荐结果</h3>
          <span class="recommendation-sub">基于您的偏好权重计算</span>
        </div>
        <div id="recommendation-list" class="recommendation-list"></div>
      </div>
    </div>

    <div class="add-bar">
      <select id="add-item-select" class="add-select">
        <option value="">选择商品添加到比较...</option>
      </select>
      <button class="btn btn-primary" id="btn-add-to-compare">➕ 添加</button>
      <button class="btn btn-ghost" id="btn-clear-compare">🗑 清空当前</button>
      <button class="btn btn-outline" id="btn-export-compare">📥 导出对比</button>
      <button class="btn btn-ghost" id="btn-settings-toggle">⚙️ 方案设置</button>
    </div>

    <div id="compare-empty" class="empty-state">
      <div class="icon">⚖️</div>
      <div class="title">选择商品进行比较</div>
      <div class="desc">从上方下拉列表中添加2个或更多商品，即可对比价格、规格、运费、保修和评价</div>
    </div>

    <div id="compare-content" class="compare-content hidden">
      <div class="compare-table-wrapper">
        <table class="compare-table" id="compare-table">
          <thead id="compare-head"></thead>
          <tbody id="compare-body"></tbody>
        </table>
      </div>
    </div>

    <div id="compare-cards" class="compare-cards"></div>
  </div>

  <script src="../shared/storage.js"></script>
  <script src="compare.js"></script>
</body>
</html>
